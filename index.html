<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f4f7fb; 
            --grid-main: rgba(0, 85, 255, 0.05); 
            --grid-sub: rgba(0, 85, 255, 0.02);
            --card-bg: rgba(255, 255, 255, 0.85); 
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --primary-color: #0055ff; 
            --primary-glow: rgba(0, 85, 255, 0.2);
            --accent-color: #00e676; /* Live status green */
            --border-color: #cbd5e1;
            --input-bg: #f8fafc;
            --input-focus-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            /* Advanced dual-layer blueprint grid */
            background-image: 
                linear-gradient(var(--grid-main) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-main) 1px, transparent 1px),
                linear-gradient(var(--grid-sub) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-sub) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Floating Flyers CSS --- */
        .background-flyers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .flyer {
            position: absolute;
            width: 220px;
            height: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 85, 255, 0.12), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            opacity: 0.95; 
            animation: float 12s ease-in-out infinite alternate;
            /* Added a subtle backdrop filter to the flyers themselves */
            backdrop-filter: blur(4px); 
        }

        .flyer-1 { top: 8%; left: 5%; animation-duration: 14s; }
        .flyer-2 { top: 12%; right: 5%; animation-duration: 16s; animation-direction: alternate-reverse; }
        .flyer-3 { bottom: 8%; left: 8%; animation-duration: 18s; animation-direction: alternate-reverse; }
        .flyer-4 { bottom: 12%; right: 8%; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }

        /* --- Form CSS --- */
        .form-container {
            position: relative;
            z-index: 10;
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 45px 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05), 
                        0 4px 10px rgba(0, 85, 255, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 1);
            width: 100%;
            max-width: 580px;
        }

        /* Live Status Indicator & Header */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0, 230, 118, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        .form-container h2 {
            color: var(--primary-color);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-container h2 span { color: var(--text-main); }

        .form-group { margin-bottom: 24px; position: relative; }

        label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 13px;
            letter-spacing: 0.5px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Techy "//" marker before labels */
        label::before {
            content: "// ";
            color: var(--primary-color);
            margin-right: 6px;
            opacity: 0.7;
        }

        label .helper-text {
            display: inline-block;
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto; /* Pushes helper text to the right */
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        /* Code-editor style inputs */
        input[type="text"], input[type="email"], input[type="tel"], textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-left: 3px solid transparent; /* Prep for focus effect */
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
            outline: none;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        input::placeholder, textarea::placeholder { 
            color: #94a3b8; 
            font-family: 'Inter', sans-serif; /* Keep placeholder easy to read */
        }

        /* Active line highlight on focus */
        input:focus, textarea:focus {
            background-color: var(--input-focus-bg);
            border-color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            box-shadow: 0 4px 15px var(--primary-glow);
            transform: translateY(-1px);
        }

        /* --- Interactive Checkboxes --- */
        .checkbox-group > div {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background-color: var(--input-bg);
            padding: 14px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin-bottom: 0;
        }

        .checkbox-group label::before { display: none; /* Hide the "//" for checkboxes */ }

        .checkbox-group label:hover {
            border-color: var(--primary-color);
            background-color: #ffffff;
        }

        /* Modern CSS :has() selector - highlights the WHOLE box when checked */
        .checkbox-group label:has(input[type="checkbox"]:checked) {
            background-color: rgba(0, 85, 255, 0.05);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color), 0 4px 12px var(--primary-glow);
            color: var(--primary-color);
            font-weight: 600;
        }

        input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Terminal Execution Button */
        button {
            background: var(--text-main);
            color: #ffffff;
            border: none;
            padding: 18px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button::before {
            content: ">";
            color: var(--primary-color);
            font-weight: 900;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        button:hover {
            background: var(--primary-color);
            box-shadow: 0 8px 25px var(--primary-glow);
            transform: translateY(-2px);
        }

        button:hover::before {
            color: #ffffff;
            transform: translateX(4px);
        }

        button:active { transform: translateY(1px); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .form-container { padding: 35px 25px; }
            .form-container h2 { font-size: 18px; }
            .checkbox-group > div { grid-template-columns: 1fr; }
            
            label .helper-text { 
                display: block; 
                margin-left: 0; 
                margin-top: 4px;
                width: 100%;
            }

            .flyer { width: 130px; opacity: 0.7; }
            .flyer-1 { top: -20px; left: -20px; }
            .flyer-2 { top: 20%; right: -30px; }
            .flyer-3 { bottom: 20%; left: -30px; }
            .flyer-4 { bottom: -20px; right: -20px; }
        }
    </style>
</head>
<body>

<div class="background-flyers">
    <img src="UIUX.jpeg" alt="UI/UX Boardroom Flyer" class="flyer flyer-1">
    <img src="tachrelayrace.jpeg" alt="Tech Relay Race Flyer" class="flyer flyer-2">
    <img src="livescrible.jpeg" alt="Live Scribble Flyer" class="flyer flyer-3">
    <img src="jackofhearts.jpeg" alt="Jack Of Hearts Flyer" class="flyer flyer-4">
</div>

<div class="form-container">
    <div class="header-wrapper">
        <div class="status-dot"></div>
        <h2>12th March <span>// Management_DAY</span></h2>
    </div>
    
    <form action="https://formspree.io/f/xzdjpnwg" method="POST">
        
        <div class="form-group">
            <label for="email">Contact Email</label>
            <input type="email" id="email" name="email" placeholder="captain@network.com" required>
        </div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter captain's name" required>
        </div>

        <div class="form-group">
            <label for="enrolment">Enrolment No.</label>
            <input type="text" id="enrolment" name="enrolment" placeholder="e.g. EN-123456" required>
        </div>

        <div class="form-group">
            <label for="contact">Contact No.</label>
            <input type="tel" id="contact" name="contact" placeholder="e.g. +91 9876543210" required>
        </div>

        <div class="form-group">
            <label for="team_name">Team Handle</label>
            <input type="text" id="team_name" name="team_name" placeholder="Enter team name" required>
        </div>

        <div class="form-group checkbox-group">
            <label style="flex-wrap: wrap;">
                Target Games
                <span class="helper-text">[Select up to 4 parameters]</span>
            </label>
            <div>
                <label><input type="checkbox" name="games[]" value="UI/UX Boardroom">UI/UX Boardroom</label>
                <label><input type="checkbox" name="games[]" value="Tech Relay Race">Tech Relay Race</label>
                <label><input type="checkbox" name="games[]" value="Live Scribble">Live Scribble</label>
                <label><input type="checkbox" name="games[]" value="Jack Of Hearts">Jack Of Hearts</label>
            </div>
        </div>

        <div class="form-group">
            <label for="team_members">Team Roster</label>
            <textarea id="team_members" name="team_members" placeholder="Player 1, Player 2, Player 3..." required></textarea>
        </div>

        <div class="form-group">
            <label for="message">Additional Intel</label>
            <textarea id="message" name="message" placeholder="Input specific requests or notes..."></textarea>
        </div>

        <button type="submit">Execute_Registration</button>
        
    </form>
</div>

</body>
</html>
