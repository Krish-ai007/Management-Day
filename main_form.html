<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #070b12;
            --grid-color: rgba(0, 240, 255, 0.05);
            --card-bg: rgba(15, 22, 33, 0.75);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.5);
            --border-color: #1e293b;
            --input-bg: rgba(10, 15, 24, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            /* Techy Grid Background */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Floating Flyers CSS --- */
        .background-flyers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0; /* Keeps it behind the form */
            pointer-events: none; /* Allows user to click through the images */
            overflow: hidden;
        }

        .flyer {
            position: absolute;
            width: 200px; /* Adjust size of flyers here */
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            opacity: 0.4; /* Slightly faded so form is readable */
            animation: float 12s ease-in-out infinite alternate;
        }

        /* Positioning and custom animation timing for each flyer */
        .flyer-1 { top: 10%; left: 8%; animation-duration: 14s; }
        .flyer-2 { top: 15%; right: 8%; animation-duration: 16s; animation-direction: alternate-reverse; }
        .flyer-3 { bottom: 10%; left: 12%; animation-duration: 18s; animation-direction: alternate-reverse; }
        .flyer-4 { bottom: 15%; right: 12%; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(0px) rotate(5deg); }
        }

        /* --- Form CSS --- */
        .form-container {
            position: relative;
            z-index: 10; /* Keeps form above the floating flyers */
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(0, 240, 255, 0.02);
            width: 100%;
            max-width: 550px;
        }

        .form-container h2 {
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 15px var(--primary-glow);
            font-family: 'JetBrains Mono', monospace;
        }

        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary-color);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'JetBrains Mono', monospace;
        }

        input[type="text"], input[type="email"], input[type="tel"], textarea {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea {
            resize: vertical;
            height: 90px;
        }

        input::placeholder, textarea::placeholder { color: #475569; }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background-color: #0f1724;
        }

        .checkbox-group > div {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            text-transform: none;
            letter-spacing: normal;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            background-color: var(--input-bg);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .checkbox-group label:hover {
            border-color: var(--primary-color);
            background-color: rgba(0, 240, 255, 0.05);
        }

        input[type="checkbox"] {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        button {
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 16px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary-color);
            color: var(--bg-base);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        button:active { transform: translateY(1px); }
    </style>
</head>
<body>

<div class="background-flyers">
    <img src="UIUX.jpeg" alt="UI/UX Boardroom Flyer" class="flyer flyer-1">
    <img src="tachrelayrace.jpeg" alt="Tech Relay Race Flyer" class="flyer flyer-2">
    <img src="livescrible.jpeg" alt="Live Scribble Flyer" class="flyer flyer-3">
    <img src="jackofhearts.jpeg" alt="Jack Of Hearts Flyer" class="flyer flyer-4">
</div>

<div class="form-container">
    <h2>Team Registration For Management Day</h2>
    
    <form action="https://formspree.io/f/xzdjpnwg" method="POST">
        
        <div class="form-group">
            <label for="email">Contact Email</label>
            <input type="email" id="email" name="email" placeholder="captain@network.com" required>
        </div>

        <div class="form-group">
            <label for="name">Full Name (Captain/Lead)</label>
            <input type="text" id="name" name="name" placeholder="Enter captain's name" required>
        </div>

        <div class="form-group">
            <label for="enrolment">Enrolment Number</label>
            <input type="text" id="enrolment" name="enrolment" placeholder="e.g. EN-123456" required>
        </div>

        <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" name="contact" placeholder="e.g. +91 9876543210" required>
        </div>

        <div class="form-group">
            <label for="team_name">Team Name</label>
            <input type="text" id="team_name" name="team_name" placeholder="Enter team handle" required>
        </div>

        <div class="form-group checkbox-group">
            <label>Games Selection (Max 4) ----->
                You can Select Multiple Games
            </label>
            <div>
                <label><input type="checkbox" name="games[]" value="UI/UX Boardroom">UI/UX Boardroom</label>
                <label><input type="checkbox" name="games[]" value="Tech Relay Race">Tech Relay Race</label>
                <label><input type="checkbox" name="games[]" value="Live Scribble">Live Scribble</label>
                <label><input type="checkbox" name="games[]" value="Jack Of Hearts">Jack Of Hearts</label>
            </div>
        </div>

        <div class="form-group">
            <label for="team_members">Team Roster</label>
            <textarea id="team_members" name="team_members" placeholder="Player 1, Player 2, Player 3..." required></textarea>
        </div>

        <div class="form-group">
            <label for="message">Additional Intel / Message</label>
            <textarea id="message" name="message" placeholder="Any special requests or notes?"></textarea>
        </div>

        <button type="submit">Execute_Registration</button>
        
    </form>
</div>

</body>
</html>
